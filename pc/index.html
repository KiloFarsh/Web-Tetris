<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TETRIS · DARK</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0b0b;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
    }

    .game-container {
      background: #121212;
      padding: 20px 25px;
      border-radius: 16px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 0 #050505;
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    /* игровое поле — тёмное, сетка приглушённая */
    .play-area {
      text-align: center;
    }

    canvas#board {
      display: block;
      margin: 0 auto;
      background-color: #0c0c0c;
      border: 2px solid #2e2e2e;
      border-radius: 6px;
      image-rendering: crisp-edges;
    }

    /* правая панель */
    .info-panel {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 18px 16px;
      box-shadow: inset 0 2px 4px #000000, 0 4px 0 #050505;
      min-width: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .score-box {
      text-align: center;
    }

    .score-label {
      color: #9a9a9a;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .score-value {
      font-size: 3.5rem;
      font-weight: 700;
      color: #c0c0c0;
      background: #181818;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid #363636;
      box-shadow: inset 0 2px 5px #000000;
      font-family: 'Courier New', monospace;
      line-height: 1.3;
    }

    .next-label {
      color: #9a9a9a;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    canvas#nextCanvas {
      background-color: #0e0e0e;
      border-radius: 8px;
      border: 1px solid #333333;
      width: 96px;
      height: 96px;
      image-rendering: crisp-edges;
    }

    .hint {
      color: #6e6e6e;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-align: center;
      margin-top: 5px;
    }

    button {
      background: #181818;
      border: 1px solid #3a3a3a;
      color: #b0b0b0;
      font-weight: bold;
      font-size: 0.9rem;
      padding: 8px 18px;
      border-radius: 30px;
      box-shadow: 0 3px 0 #050505;
      cursor: pointer;
      transition: all 0.08s;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    button:hover {
      background: #222222;
      color: #e0e0e0;
      border-color: #555;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #050505;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="play-area">
    <canvas id="board" width="300" height="600"></canvas>
  </div>
  <div class="info-panel">
    <div class="score-box">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div style="text-align: center;">
      <div class="next-label">NEXT</div>
      <canvas id="nextCanvas" width="120" height="120"></canvas>
    </div>
    <div class="hint">
      ← → ↓ &nbsp;&nbsp; ⬆ rotate<br>
      [ SPACE ] pause<br>
      [ H ] hard drop
    </div>
    <button id="restartButton">↻ RESTART</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- НАСТРОЙКИ ----------
    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 30;        // px
    const NEXT_SIZE = 24;         // px для preview

    // Фигуры — цвета приглушённые, без неона
    const SHAPES = [
      { // I
        matrix: [[1,1,1,1]],
        color: '#5f9ea0'   // cadet blue
      },
      { // O
        matrix: [[1,1],[1,1]],
        color: '#b8865b'   // тёмный золотисто-коричневый
      },
      { // T
        matrix: [[0,1,0],[1,1,1]],
        color: '#8b6b9b'   // приглушённый фиолетовый
      },
      { // S
        matrix: [[0,1,1],[1,1,0]],
        color: '#6f9e6f'   // тёмно-зелёный
      },
      { // Z
        matrix: [[1,1,0],[0,1,1]],
        color: '#b07070'   // терракотовый
      },
      { // L
        matrix: [[1,0,0],[1,1,1]],
        color: '#b08b5c'   // охра
      },
      { // J
        matrix: [[0,0,1],[1,1,1]],
        color: '#6a7a9e'   // серо-синий
      }
    ];

    // ---------- ПЕРЕМЕННЫЕ ----------
    let board = [];
    let currentPiece = null;       // { matrix, color, x, y }
    let nextPiece = null;
    let score = 0;
    let gameOver = false;
    let paused = false;
    let gameInterval = null;
    const BASE_INTERVAL_MS = 400;

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    // ---------- УТИЛИТЫ ----------
    function createEmptyBoard() {
      return Array(ROWS).fill().map(() => Array(COLS).fill(''));
    }

    function getRandomPiece() {
      const idx = Math.floor(Math.random() * SHAPES.length);
      const shape = SHAPES[idx];
      return {
        matrix: shape.matrix.map(row => [...row]),
        color: shape.color
      };
    }

    function spawnNewPiece() {
      if (!nextPiece) {
        nextPiece = getRandomPiece();
      }
      const newMatrix = nextPiece.matrix.map(row => [...row]);
      currentPiece = {
        matrix: newMatrix,
        color: nextPiece.color,
        x: Math.floor((COLS - newMatrix[0].length) / 2),
        y: 0
      };
      nextPiece = getRandomPiece();

      if (collision(currentPiece.matrix, currentPiece.x, currentPiece.y)) {
        gameOver = true;
        clearGameLoop();
        currentPiece = null;
      }
    }

    // Проверка коллизий
    function collision(matrix, offsetX, offsetY) {
      for (let row = 0; row < matrix.length; row++) {
        for (let col = 0; col < matrix[0].length; col++) {
          if (matrix[row][col] !== 0) {
            const boardX = offsetX + col;
            const boardY = offsetY + row;
            if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) {
              return true;
            }
            if (boardY >= 0 && board[boardY][boardX] !== '') {
              return true;
            }
          }
        }
      }
      return false;
    }

    // Фиксация фигуры на доске
    function lockPiece() {
      if (!currentPiece) return;
      const { matrix, color, x, y } = currentPiece;
      for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[0].length; c++) {
          if (matrix[r][c] !== 0) {
            const boardY = y + r;
            const boardX = x + c;
            if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
              board[boardY][boardX] = color;
            }
          }
        }
      }

      clearFullRows();
      spawnNewPiece();
      if (gameOver) clearGameLoop();
    }

    // Удаление заполненных линий
    function clearFullRows() {
      let linesCleared = 0;
      for (let row = ROWS - 1; row >= 0; ) {
        if (board[row].every(cell => cell !== '')) {
          board.splice(row, 1);
          board.unshift(Array(COLS).fill(''));
          linesCleared++;
        } else {
          row--;
        }
      }

      if (linesCleared > 0) {
        const addScore = linesCleared === 1 ? 10 :
                         linesCleared === 2 ? 25 :
                         linesCleared === 3 ? 45 : 70;
        score += addScore;
        updateScoreDisplay();
      }
    }

    // Движение
    function movePiece(dx, dy) {
      if (!currentPiece || gameOver || paused) return false;
      const { matrix, x, y } = currentPiece;
      if (!collision(matrix, x + dx, y + dy)) {
        currentPiece.x += dx;
        currentPiece.y += dy;
        drawAll();
        return true;
      } else if (dy === 1) {
        lockPiece();
        drawAll();
        if (gameOver) clearGameLoop();
      }
      return false;
    }

    // Поворот
    function rotatePiece() {
      if (!currentPiece || gameOver || paused) return;
      const matrix = currentPiece.matrix;
      const rotated = matrix[0].map((_, idx) => matrix.map(row => row[idx]).reverse());
      
      if (!collision(rotated, currentPiece.x, currentPiece.y)) {
        currentPiece.matrix = rotated;
      } else {
        if (!collision(rotated, currentPiece.x - 1, currentPiece.y)) {
          currentPiece.matrix = rotated;
          currentPiece.x -= 1;
        } else if (!collision(rotated, currentPiece.x + 1, currentPiece.y)) {
          currentPiece.matrix = rotated;
          currentPiece.x += 1;
        }
      }
      drawAll();
    }

    function hardDrop() {
      if (!currentPiece || gameOver || paused) return;
      while (!collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
        currentPiece.y++;
      }
      lockPiece();
      drawAll();
      if (gameOver) clearGameLoop();
    }

    // ---------- ОТРИСОВКА (тёмная, без теней) ----------
    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Сетка (тёмно-серая)
      ctx.strokeStyle = '#2c2c2c';
      ctx.lineWidth = 0.7;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * BLOCK_SIZE, 0);
        ctx.lineTo(i * BLOCK_SIZE, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * BLOCK_SIZE);
        ctx.lineTo(canvas.width, j * BLOCK_SIZE);
        ctx.stroke();
      }

      // Зафиксированные блоки
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const color = board[row][col];
          if (color) {
            ctx.fillStyle = color;
            ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
            // тонкая внутренняя обводка
            ctx.strokeStyle = '#404040';
            ctx.lineWidth = 1;
            ctx.strokeRect(col * BLOCK_SIZE+1, row * BLOCK_SIZE+1, BLOCK_SIZE-3, BLOCK_SIZE-3);
          }
        }
      }

      // Текущая фигура
      if (currentPiece && !gameOver) {
        const { matrix, color, x, y } = currentPiece;
        ctx.fillStyle = color;
        for (let r = 0; r < matrix.length; r++) {
          for (let c = 0; c < matrix[0].length; c++) {
            if (matrix[r][c] !== 0) {
              const boardX = (x + c) * BLOCK_SIZE;
              const boardY = (y + r) * BLOCK_SIZE;
              ctx.fillRect(boardX, boardY, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
            }
          }
        }
        ctx.strokeStyle = '#5a5a5a';
        ctx.lineWidth = 1.2;
        for (let r = 0; r < matrix.length; r++) {
          for (let c = 0; c < matrix[0].length; c++) {
            if (matrix[r][c] !== 0) {
              const boardX = (x + c) * BLOCK_SIZE;
              const boardY = (y + r) * BLOCK_SIZE;
              ctx.strokeRect(boardX+1, boardY+1, BLOCK_SIZE-3, BLOCK_SIZE-3);
            }
          }
        }
      }

      // Оверлей при паузе / game over
      if (gameOver) {
        ctx.fillStyle = '#0a0a0acc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.fillStyle = '#a0a0a0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
      } else if (paused) {
        ctx.fillStyle = '#101010cc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 24px "Courier New", monospace';
        ctx.fillStyle = '#b0b0b0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
      }
    }

    function drawNext() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      if (!nextPiece) return;
      
      // сетка preview
      nextCtx.strokeStyle = '#2a2a2a';
      nextCtx.lineWidth = 0.8;
      for (let i=0; i<=4; i++) {
        nextCtx.beginPath();
        nextCtx.moveTo(i*NEXT_SIZE, 0);
        nextCtx.lineTo(i*NEXT_SIZE, nextCanvas.height);
        nextCtx.stroke();
        nextCtx.beginPath();
        nextCtx.moveTo(0, i*NEXT_SIZE);
        nextCtx.lineTo(nextCanvas.width, i*NEXT_SIZE);
        nextCtx.stroke();
      }

      const matrix = nextPiece.matrix;
      const color = nextPiece.color;
      const cols = matrix[0].length;
      const rows = matrix.length;
      const offsetX = (4 - cols) * NEXT_SIZE / 2;
      const offsetY = (4 - rows) * NEXT_SIZE / 2;

      for (let r=0; r<rows; r++) {
        for (let c=0; c<cols; c++) {
          if (matrix[r][c]) {
            const x = offsetX + c * NEXT_SIZE;
            const y = offsetY + r * NEXT_SIZE;
            nextCtx.fillStyle = color;
            nextCtx.fillRect(x, y, NEXT_SIZE-1, NEXT_SIZE-1);
            nextCtx.strokeStyle = '#4f4f4f';
            nextCtx.lineWidth = 1.2;
            nextCtx.strokeRect(x+1, y+1, NEXT_SIZE-3, NEXT_SIZE-3);
          }
        }
      }
    }

    function drawAll() {
      drawBoard();
      drawNext();
    }

    function updateScoreDisplay() {
      scoreDisplay.textContent = score;
    }

    // ---------- ИГРОВОЙ ЦИКЛ ----------
    function gameTick() {
      if (gameOver || paused || !currentPiece) return;
      movePiece(0, 1);
      drawAll();
    }

    function startGameLoop() {
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(gameTick, BASE_INTERVAL_MS);
    }

    function clearGameLoop() {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
    }

    function togglePause() {
      if (gameOver) return;
      paused = !paused;
      drawAll();
      if (!paused && !gameOver && !gameInterval) {
        startGameLoop();
      }
    }

    function resetGame() {
      board = createEmptyBoard();
      score = 0;
      gameOver = false;
      paused = false;
      updateScoreDisplay();
      nextPiece = getRandomPiece();
      spawnNewPiece();
      drawAll();
      clearGameLoop();
      startGameLoop();
    }

    // ---------- УПРАВЛЕНИЕ ----------
    function handleKeyDown(e) {
      const key = e.key;
      const preventKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '];
      if (preventKeys.includes(key)) {
        e.preventDefault();
      }
      if (gameOver) return;

      switch (key) {
        case 'ArrowLeft':  movePiece(-1, 0); break;
        case 'ArrowRight': movePiece(1, 0); break;
        case 'ArrowDown':  movePiece(0, 1); break;
        case 'ArrowUp':    rotatePiece(); break;
        case ' ':          togglePause(); break;
        default: return;
      }
      drawAll();
    }

    // Hard drop по H
    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') {
        e.preventDefault();
        if (!gameOver && !paused) {
          hardDrop();
          drawAll();
        }
      }
      if (e.key === 'r' || e.key === 'R') {
        resetGame();
      }
    });

    document.addEventListener('keydown', handleKeyDown);
    document.getElementById('restartButton').addEventListener('click', resetGame);

    window.addEventListener('keyup', (e) => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
        e.preventDefault();
      }
    });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // Старт
    resetGame();
  })();
</script>
</body>
</html>
