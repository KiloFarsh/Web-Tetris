<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TETRIS · MOBILE</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0b0b;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
      padding: 8px;
    }

    .game-container {
      background: #121212;
      padding: 16px 12px;
      border-radius: 16px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 0 #050505;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      max-width: 100%;
    }

    /* игровое поле — адаптивный размер */
    .play-area {
      text-align: center;
      width: 100%;
    }

    canvas#board {
      display: block;
      margin: 0 auto;
      background-color: #0c0c0c;
      border: 2px solid #2e2e2e;
      border-radius: 6px;
      image-rendering: crisp-edges;
      width: 100%;
      max-width: 300px;
      height: auto;
      aspect-ratio: 1 / 2;
    }

    /* верхняя панель с информацией */
    .top-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 12px;
    }

    .score-box {
      text-align: left;
      flex: 1;
    }

    .score-label {
      color: #9a9a9a;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      font-size: 0.8rem;
      margin-bottom: 2px;
    }

    .score-value {
      font-size: 2rem;
      font-weight: 700;
      color: #c0c0c0;
      background: #181818;
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid #363636;
      box-shadow: inset 0 2px 4px #000000;
      font-family: 'Courier New', monospace;
      line-height: 1.2;
      display: inline-block;
    }

    .next-container {
      text-align: right;
    }

    .next-label {
      color: #9a9a9a;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.75rem;
      margin-bottom: 2px;
    }

    canvas#nextCanvas {
      background-color: #0e0e0e;
      border-radius: 6px;
      border: 1px solid #333333;
      width: 70px;
      height: 70px;
      image-rendering: crisp-edges;
    }

    /* панель управления — сенсорные кнопки */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin-top: 4px;
    }

    .control-row {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .ctrl-btn {
      background: #181818;
      border: 1px solid #3a3a3a;
      color: #b0b0b0;
      font-weight: bold;
      font-size: 1.5rem;
      padding: 12px 0;
      border-radius: 12px;
      box-shadow: 0 4px 0 #050505;
      cursor: pointer;
      transition: all 0.06s;
      font-family: inherit;
      text-align: center;
      flex: 1;
      min-width: 70px;
      touch-action: manipulation;
      user-select: none;
    }

    .ctrl-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #050505;
      background: #222222;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .action-btn {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      color: #a0a0a0;
      font-weight: bold;
      font-size: 1rem;
      padding: 12px 8px;
      border-radius: 30px;
      box-shadow: 0 3px 0 #050505;
      cursor: pointer;
      transition: all 0.06s;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex: 1;
      touch-action: manipulation;
    }

    .action-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #050505;
      background: #252525;
    }

    .hint {
      color: #5a5a5a;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-align: center;
      margin-top: 5px;
    }

    /* десктопные подсказки скрываем на мобильных, но показываем кнопки */
    @media (min-width: 768px) {
      .controls {
        display: none;
      }
      .hint {
        display: block;
      }
    }

    @media (max-width: 767px) {
      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Верхняя панель: счёт и следующая фигура -->
  <div class="top-panel">
    <div class="score-box">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="next-container">
      <div class="next-label">NEXT</div>
      <canvas id="nextCanvas" width="120" height="120"></canvas>
    </div>
  </div>

  <!-- Игровое поле -->
  <div class="play-area">
    <canvas id="board" width="300" height="600"></canvas>
  </div>

  <!-- Сенсорные кнопки управления (показываются только на мобильных) -->
  <div class="controls">
    <div class="control-row">
      <div class="ctrl-btn" data-action="left">←</div>
      <div class="ctrl-btn" data-action="right">→</div>
      <div class="ctrl-btn" data-action="rotate">↻</div>
    </div>
    <div class="control-row">
      <div class="ctrl-btn" data-action="down">↓</div>
      <div class="ctrl-btn" data-action="hardDrop">⬇⬇</div>
    </div>
    <div class="action-buttons">
      <div class="action-btn" data-action="pause">⏸ PAUSE</div>
      <div class="action-btn" data-action="restart">↺ RESTART</div>
    </div>
  </div>

  <!-- Десктопная подсказка (скрыта на мобильных) -->
  <div class="hint">
    ← → ↓ &nbsp;&nbsp; ⬆ rotate &nbsp;|&nbsp; SPACE pause &nbsp;|&nbsp; H hard drop
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- НАСТРОЙКИ ----------
    const COLS = 10;
    const ROWS = 20;
    let BLOCK_SIZE = 30;        // будет пересчитываться
    const NEXT_SIZE = 24;

    // Фигуры
    const SHAPES = [
      { matrix: [[1,1,1,1]], color: '#5f9ea0' },
      { matrix: [[1,1],[1,1]], color: '#b8865b' },
      { matrix: [[0,1,0],[1,1,1]], color: '#8b6b9b' },
      { matrix: [[0,1,1],[1,1,0]], color: '#6f9e6f' },
      { matrix: [[1,1,0],[0,1,1]], color: '#b07070' },
      { matrix: [[1,0,0],[1,1,1]], color: '#b08b5c' },
      { matrix: [[0,0,1],[1,1,1]], color: '#6a7a9e' }
    ];

    // ---------- ПЕРЕМЕННЫЕ ----------
    let board = [];
    let currentPiece = null;
    let nextPiece = null;
    let score = 0;
    let gameOver = false;
    let paused = false;
    let gameInterval = null;
    const BASE_INTERVAL_MS = 400;

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    // ---------- АДАПТИВНЫЙ РАЗМЕР БЛОКА ----------
    function updateBlockSize() {
      const container = canvas.parentElement;
      const maxWidth = Math.min(container.clientWidth, 300);
      canvas.style.width = maxWidth + 'px';
      BLOCK_SIZE = maxWidth / COLS;
    }

    // ---------- УТИЛИТЫ ----------
    function createEmptyBoard() {
      return Array(ROWS).fill().map(() => Array(COLS).fill(''));
    }

    function getRandomPiece() {
      const idx = Math.floor(Math.random() * SHAPES.length);
      const shape = SHAPES[idx];
      return {
        matrix: shape.matrix.map(row => [...row]),
        color: shape.color
      };
    }

    function spawnNewPiece() {
      if (!nextPiece) {
        nextPiece = getRandomPiece();
      }
      const newMatrix = nextPiece.matrix.map(row => [...row]);
      currentPiece = {
        matrix: newMatrix,
        color: nextPiece.color,
        x: Math.floor((COLS - newMatrix[0].length) / 2),
        y: 0
      };
      nextPiece = getRandomPiece();

      if (collision(currentPiece.matrix, currentPiece.x, currentPiece.y)) {
        gameOver = true;
        clearGameLoop();
        currentPiece = null;
      }
    }

    function collision(matrix, offsetX, offsetY) {
      for (let row = 0; row < matrix.length; row++) {
        for (let col = 0; col < matrix[0].length; col++) {
          if (matrix[row][col] !== 0) {
            const boardX = offsetX + col;
            const boardY = offsetY + row;
            if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) {
              return true;
            }
            if (boardY >= 0 && board[boardY][boardX] !== '') {
              return true;
            }
          }
        }
      }
      return false;
    }

    function lockPiece() {
      if (!currentPiece) return;
      const { matrix, color, x, y } = currentPiece;
      for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[0].length; c++) {
          if (matrix[r][c] !== 0) {
            const boardY = y + r;
            const boardX = x + c;
            if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
              board[boardY][boardX] = color;
            }
          }
        }
      }

      clearFullRows();
      spawnNewPiece();
      if (gameOver) clearGameLoop();
    }

    function clearFullRows() {
      let linesCleared = 0;
      for (let row = ROWS - 1; row >= 0; ) {
        if (board[row].every(cell => cell !== '')) {
          board.splice(row, 1);
          board.unshift(Array(COLS).fill(''));
          linesCleared++;
        } else {
          row--;
        }
      }

      if (linesCleared > 0) {
        const addScore = linesCleared === 1 ? 10 :
                         linesCleared === 2 ? 25 :
                         linesCleared === 3 ? 45 : 70;
        score += addScore;
        updateScoreDisplay();
      }
    }

    function movePiece(dx, dy) {
      if (!currentPiece || gameOver || paused) return false;
      const { matrix, x, y } = currentPiece;
      if (!collision(matrix, x + dx, y + dy)) {
        currentPiece.x += dx;
        currentPiece.y += dy;
        drawAll();
        return true;
      } else if (dy === 1) {
        lockPiece();
        drawAll();
        if (gameOver) clearGameLoop();
      }
      return false;
    }

    function rotatePiece() {
      if (!currentPiece || gameOver || paused) return;
      const matrix = currentPiece.matrix;
      const rotated = matrix[0].map((_, idx) => matrix.map(row => row[idx]).reverse());
      
      if (!collision(rotated, currentPiece.x, currentPiece.y)) {
        currentPiece.matrix = rotated;
      } else {
        if (!collision(rotated, currentPiece.x - 1, currentPiece.y)) {
          currentPiece.matrix = rotated;
          currentPiece.x -= 1;
        } else if (!collision(rotated, currentPiece.x + 1, currentPiece.y)) {
          currentPiece.matrix = rotated;
          currentPiece.x += 1;
        }
      }
      drawAll();
    }

    function hardDrop() {
      if (!currentPiece || gameOver || paused) return;
      while (!collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
        currentPiece.y++;
      }
      lockPiece();
      drawAll();
      if (gameOver) clearGameLoop();
    }

    // ---------- ОТРИСОВКА ----------
    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Сетка
      ctx.strokeStyle = '#2c2c2c';
      ctx.lineWidth = 0.7;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * BLOCK_SIZE, 0);
        ctx.lineTo(i * BLOCK_SIZE, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * BLOCK_SIZE);
        ctx.lineTo(canvas.width, j * BLOCK_SIZE);
        ctx.stroke();
      }

      // Зафиксированные блоки
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const color = board[row][col];
          if (color) {
            ctx.fillStyle = color;
            ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
            ctx.strokeStyle = '#404040';
            ctx.lineWidth = 1;
            ctx.strokeRect(col * BLOCK_SIZE+1, row * BLOCK_SIZE+1, BLOCK_SIZE-3, BLOCK_SIZE-3);
          }
        }
      }

      // Текущая фигура
      if (currentPiece && !gameOver) {
        const { matrix, color, x, y } = currentPiece;
        ctx.fillStyle = color;
        for (let r = 0; r < matrix.length; r++) {
          for (let c = 0; c < matrix[0].length; c++) {
            if (matrix[r][c] !== 0) {
              const boardX = (x + c) * BLOCK_SIZE;
              const boardY = (y + r) * BLOCK_SIZE;
              ctx.fillRect(boardX, boardY, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
            }
          }
        }
        ctx.strokeStyle = '#5a5a5a';
        ctx.lineWidth = 1.2;
        for (let r = 0; r < matrix.length; r++) {
          for (let c = 0; c < matrix[0].length; c++) {
            if (matrix[r][c] !== 0) {
              const boardX = (x + c) * BLOCK_SIZE;
              const boardY = (y + r) * BLOCK_SIZE;
              ctx.strokeRect(boardX+1, boardY+1, BLOCK_SIZE-3, BLOCK_SIZE-3);
            }
          }
        }
      }

      if (gameOver) {
        ctx.fillStyle = '#0a0a0acc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `bold ${Math.floor(canvas.width/12)}px "Courier New", monospace`;
        ctx.fillStyle = '#a0a0a0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
      } else if (paused) {
        ctx.fillStyle = '#101010cc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `bold ${Math.floor(canvas.width/10)}px "Courier New", monospace`;
        ctx.fillStyle = '#b0b0b0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
      }
    }

    function drawNext() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      if (!nextPiece) return;
      
      nextCtx.strokeStyle = '#2a2a2a';
      nextCtx.lineWidth = 0.8;
      for (let i=0; i<=4; i++) {
        nextCtx.beginPath();
        nextCtx.moveTo(i*NEXT_SIZE, 0);
        nextCtx.lineTo(i*NEXT_SIZE, nextCanvas.height);
        nextCtx.stroke();
        nextCtx.beginPath();
        nextCtx.moveTo(0, i*NEXT_SIZE);
        nextCtx.lineTo(nextCanvas.width, i*NEXT_SIZE);
        nextCtx.stroke();
      }

      const matrix = nextPiece.matrix;
      const color = nextPiece.color;
      const cols = matrix[0].length;
      const rows = matrix.length;
      const offsetX = (4 - cols) * NEXT_SIZE / 2;
      const offsetY = (4 - rows) * NEXT_SIZE / 2;

      for (let r=0; r<rows; r++) {
        for (let c=0; c<cols; c++) {
          if (matrix[r][c]) {
            const x = offsetX + c * NEXT_SIZE;
            const y = offsetY + r * NEXT_SIZE;
            nextCtx.fillStyle = color;
            nextCtx.fillRect(x, y, NEXT_SIZE-1, NEXT_SIZE-1);
            nextCtx.strokeStyle = '#4f4f4f';
            nextCtx.lineWidth = 1.2;
            nextCtx.strokeRect(x+1, y+1, NEXT_SIZE-3, NEXT_SIZE-3);
          }
        }
      }
    }

    function drawAll() {
      drawBoard();
      drawNext();
    }

    function updateScoreDisplay() {
      scoreDisplay.textContent = score;
    }

    // ---------- ИГРОВОЙ ЦИКЛ ----------
    function gameTick() {
      if (gameOver || paused || !currentPiece) return;
      movePiece(0, 1);
      drawAll();
    }

    function startGameLoop() {
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(gameTick, BASE_INTERVAL_MS);
    }

    function clearGameLoop() {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
    }

    function togglePause() {
      if (gameOver) return;
      paused = !paused;
      drawAll();
      if (!paused && !gameOver && !gameInterval) {
        startGameLoop();
      }
    }

    function resetGame() {
      board = createEmptyBoard();
      score = 0;
      gameOver = false;
      paused = false;
      updateScoreDisplay();
      nextPiece = getRandomPiece();
      spawnNewPiece();
      drawAll();
      clearGameLoop();
      startGameLoop();
    }

    // ---------- УПРАВЛЕНИЕ ----------
    function handleKeyDown(e) {
      const key = e.key;
      const preventKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '];
      if (preventKeys.includes(key)) {
        e.preventDefault();
      }
      if (gameOver) return;

      switch (key) {
        case 'ArrowLeft':  movePiece(-1, 0); break;
        case 'ArrowRight': movePiece(1, 0); break;
        case 'ArrowDown':  movePiece(0, 1); break;
        case 'ArrowUp':    rotatePiece(); break;
        case ' ':          togglePause(); break;
        default: return;
      }
      drawAll();
    }

    // Hard drop по H (десктоп)
    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') {
        e.preventDefault();
        if (!gameOver && !paused) {
          hardDrop();
          drawAll();
        }
      }
      if (e.key === 'r' || e.key === 'R') {
        resetGame();
      }
    });

    document.addEventListener('keydown', handleKeyDown);
    
    window.addEventListener('keyup', (e) => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
        e.preventDefault();
      }
    });

    // ---------- СЕНСОРНОЕ УПРАВЛЕНИЕ ----------
    function handleTouchAction(action) {
      if (gameOver) {
        if (action === 'restart') resetGame();
        return;
      }
      
      switch(action) {
        case 'left': movePiece(-1, 0); break;
        case 'right': movePiece(1, 0); break;
        case 'down': movePiece(0, 1); break;
        case 'rotate': rotatePiece(); break;
        case 'hardDrop': hardDrop(); break;
        case 'pause': togglePause(); break;
        case 'restart': resetGame(); break;
      }
      drawAll();
    }

    // Навешиваем обработчики на сенсорные кнопки
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const action = btn.getAttribute('data-action');
        handleTouchAction(action);
      });
      
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
      }, { passive: false });
    });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // ---------- АДАПТИВНОСТЬ ----------
    window.addEventListener('resize', () => {
      updateBlockSize();
      drawAll();
    });

    // Инициализация
    updateBlockSize();
    resetGame();
  })();
</script>
</body>
</html>
