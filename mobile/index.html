<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TETRIS · MOBILE</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
      padding: 6px;
    }

    .game-container {
      background: #121212;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      max-width: 100%;
      width: 100%;
    }

    /* компактная верхняя панель */
    .top-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 4px;
    }

    .score-box {
      text-align: left;
    }

    .score-label {
      color: #888;
      font-size: 0.7rem;
      letter-spacing: 1px;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ccc;
      background: #181818;
      padding: 2px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      line-height: 1.3;
      display: inline-block;
    }

    .next-container {
      text-align: right;
    }

    .next-label {
      color: #888;
      font-size: 0.65rem;
      letter-spacing: 1px;
    }

    canvas#nextCanvas {
      background-color: #0e0e0e;
      border-radius: 4px;
      border: 1px solid #333;
      width: 60px;
      height: 60px;
      image-rendering: crisp-edges;
    }

    /* игровое поле */
    canvas#board {
      display: block;
      margin: 0 auto;
      background-color: #0c0c0c;
      border: 2px solid #2e2e2e;
      border-radius: 6px;
      image-rendering: crisp-edges;
      width: 100%;
      max-width: 280px;
      height: auto;
      aspect-ratio: 1 / 2;
    }

    /* сенсорные кнопки - компактные */
    .touch-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      margin-top: 2px;
    }

    .direction-pad {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .touch-btn {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      color: #ccc;
      font-weight: bold;
      font-size: 1.3rem;
      padding: 10px 0;
      border-radius: 10px;
      box-shadow: 0 3px 0 #080808;
      cursor: pointer;
      text-align: center;
      flex: 1;
      touch-action: manipulation;
      transition: all 0.05s;
    }

    .touch-btn.small {
      font-size: 1rem;
      padding: 8px 0;
    }

    .touch-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #080808;
      background: #252525;
    }

    /* скрываем на десктопе */
    @media (min-width: 768px) {
      .touch-controls {
        display: none;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Верх: счёт и next -->
  <div class="top-panel">
    <div class="score-box">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="next-container">
      <div class="next-label">NEXT</div>
      <canvas id="nextCanvas" width="120" height="120"></canvas>
    </div>
  </div>

  <!-- Поле -->
  <canvas id="board" width="300" height="600"></canvas>

  <!-- Сенсорное управление -->
  <div class="touch-controls">
    <div class="direction-pad">
      <button class="touch-btn" data-action="left">←</button>
      <button class="touch-btn" data-action="right">→</button>
      <button class="touch-btn" data-action="rotate">↻</button>
    </div>
    <div class="direction-pad">
      <button class="touch-btn" data-action="down">↓</button>
      <button class="touch-btn" data-action="hardDrop">⬇⬇</button>
    </div>
    <div class="action-row">
      <button class="touch-btn small" data-action="pause">⏸ PAUSE</button>
      <button class="touch-btn small" data-action="restart">↺ NEW</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- НАСТРОЙКИ ----------
    const COLS = 10;
    const ROWS = 20;
    let BLOCK_SIZE = 30;
    const NEXT_SIZE = 24;

    const SHAPES = [
      { matrix: [[1,1,1,1]], color: '#5f9ea0' },
      { matrix: [[1,1],[1,1]], color: '#b8865b' },
      { matrix: [[0,1,0],[1,1,1]], color: '#8b6b9b' },
      { matrix: [[0,1,1],[1,1,0]], color: '#6f9e6f' },
      { matrix: [[1,1,0],[0,1,1]], color: '#b07070' },
      { matrix: [[1,0,0],[1,1,1]], color: '#b08b5c' },
      { matrix: [[0,0,1],[1,1,1]], color: '#6a7a9e' }
    ];

    // ---------- ПЕРЕМЕННЫЕ ----------
    let board = [];
    let currentPiece = null;
    let nextPiece = null;
    let score = 0;
    let gameOver = false;
    let paused = false;
    let gameInterval = null;
    const BASE_INTERVAL_MS = 400;

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    // ---------- АДАПТИВНОСТЬ ----------
    function updateBlockSize() {
      const maxWidth = Math.min(canvas.parentElement.clientWidth, 280);
      canvas.style.width = maxWidth + 'px';
      BLOCK_SIZE = maxWidth / COLS;
    }

    // ---------- УТИЛИТЫ ----------
    function createEmptyBoard() {
      return Array(ROWS).fill().map(() => Array(COLS).fill(''));
    }

    function getRandomPiece() {
      const idx = Math.floor(Math.random() * SHAPES.length);
      const shape = SHAPES[idx];
      return {
        matrix: shape.matrix.map(row => [...row]),
        color: shape.color
      };
    }

    function spawnNewPiece() {
      if (!nextPiece) nextPiece = getRandomPiece();
      const newMatrix = nextPiece.matrix.map(row => [...row]);
      currentPiece = {
        matrix: newMatrix,
        color: nextPiece.color,
        x: Math.floor((COLS - newMatrix[0].length) / 2),
        y: 0
      };
      nextPiece = getRandomPiece();

      if (collision(currentPiece.matrix, currentPiece.x, currentPiece.y)) {
        gameOver = true;
        clearGameLoop();
        currentPiece = null;
      }
    }

    function collision(matrix, offsetX, offsetY) {
      for (let row = 0; row < matrix.length; row++) {
        for (let col = 0; col < matrix[0].length; col++) {
          if (matrix[row][col] !== 0) {
            const boardX = offsetX + col;
            const boardY = offsetY + row;
            if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
            if (boardY >= 0 && board[boardY][boardX] !== '') return true;
          }
        }
      }
      return false;
    }

    function lockPiece() {
      if (!currentPiece) return;
      const { matrix, color, x, y } = currentPiece;
      for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[0].length; c++) {
          if (matrix[r][c] !== 0) {
            const boardY = y + r;
            const boardX = x + c;
            if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
              board[boardY][boardX] = color;
            }
          }
        }
      }
      clearFullRows();
      spawnNewPiece();
      if (gameOver) clearGameLoop();
    }

    function clearFullRows() {
      let lines = 0;
      for (let row = ROWS - 1; row >= 0; ) {
        if (board[row].every(cell => cell !== '')) {
          board.splice(row, 1);
          board.unshift(Array(COLS).fill(''));
          lines++;
        } else {
          row--;
        }
      }
      if (lines > 0) {
        const add = lines === 1 ? 10 : lines === 2 ? 25 : lines === 3 ? 45 : 70;
        score += add;
        updateScore();
      }
    }

    function movePiece(dx, dy) {
      if (!currentPiece || gameOver || paused) return false;
      const { matrix, x, y } = currentPiece;
      if (!collision(matrix, x + dx, y + dy)) {
        currentPiece.x += dx;
        currentPiece.y += dy;
        drawAll();
        return true;
      } else if (dy === 1) {
        lockPiece();
        drawAll();
        if (gameOver) clearGameLoop();
      }
      return false;
    }

    function rotatePiece() {
      if (!currentPiece || gameOver || paused) return;
      const matrix = currentPiece.matrix;
      const rotated = matrix[0].map((_, idx) => matrix.map(row => row[idx]).reverse());
      
      if (!collision(rotated, currentPiece.x, currentPiece.y)) {
        currentPiece.matrix = rotated;
      } else {
        if (!collision(rotated, currentPiece.x - 1, currentPiece.y)) {
          currentPiece.matrix = rotated;
          currentPiece.x -= 1;
        } else if (!collision(rotated, currentPiece.x + 1, currentPiece.y)) {
          currentPiece.matrix = rotated;
          currentPiece.x += 1;
        }
      }
      drawAll();
    }

    function hardDrop() {
      if (!currentPiece || gameOver || paused) return;
      while (!collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
        currentPiece.y++;
      }
      lockPiece();
      drawAll();
      if (gameOver) clearGameLoop();
    }

    // ---------- ОТРИСОВКА ----------
    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Сетка
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 0.6;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * BLOCK_SIZE, 0);
        ctx.lineTo(i * BLOCK_SIZE, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * BLOCK_SIZE);
        ctx.lineTo(canvas.width, j * BLOCK_SIZE);
        ctx.stroke();
      }

      // Блоки
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const color = board[row][col];
          if (color) {
            ctx.fillStyle = color;
            ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
            ctx.strokeStyle = '#404040';
            ctx.lineWidth = 0.8;
            ctx.strokeRect(col * BLOCK_SIZE+1, row * BLOCK_SIZE+1, BLOCK_SIZE-3, BLOCK_SIZE-3);
          }
        }
      }

      // Текущая фигура
      if (currentPiece && !gameOver) {
        const { matrix, color, x, y } = currentPiece;
        ctx.fillStyle = color;
        for (let r = 0; r < matrix.length; r++) {
          for (let c = 0; c < matrix[0].length; c++) {
            if (matrix[r][c] !== 0) {
              ctx.fillRect((x + c) * BLOCK_SIZE, (y + r) * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
            }
          }
        }
      }

      // Статусы
      if (gameOver) {
        ctx.fillStyle = '#0a0a0acc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `bold ${Math.floor(canvas.width/12)}px "Courier New", monospace`;
        ctx.fillStyle = '#aaa';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
      } else if (paused) {
        ctx.fillStyle = '#101010cc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `bold ${Math.floor(canvas.width/10)}px "Courier New", monospace`;
        ctx.fillStyle = '#bbb';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
      }
    }

    function drawNext() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      if (!nextPiece) return;
      
      const matrix = nextPiece.matrix;
      const color = nextPiece.color;
      const cols = matrix[0].length;
      const rows = matrix.length;
      const offsetX = (4 - cols) * NEXT_SIZE / 2;
      const offsetY = (4 - rows) * NEXT_SIZE / 2;

      for (let r=0; r<rows; r++) {
        for (let c=0; c<cols; c++) {
          if (matrix[r][c]) {
            const x = offsetX + c * NEXT_SIZE;
            const y = offsetY + r * NEXT_SIZE;
            nextCtx.fillStyle = color;
            nextCtx.fillRect(x, y, NEXT_SIZE-1, NEXT_SIZE-1);
          }
        }
      }
    }

    function drawAll() {
      drawBoard();
      drawNext();
    }

    function updateScore() {
      scoreDisplay.textContent = score;
    }

    // ---------- ЦИКЛ ----------
    function gameTick() {
      if (gameOver || paused || !currentPiece) return;
      movePiece(0, 1);
    }

    function startLoop() {
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(gameTick, BASE_INTERVAL_MS);
    }

    function clearGameLoop() {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
    }

    function togglePause() {
      if (gameOver) return;
      paused = !paused;
      drawAll();
      if (!paused && !gameOver && !gameInterval) startLoop();
    }

    function resetGame() {
      board = createEmptyBoard();
      score = 0;
      gameOver = false;
      paused = false;
      updateScore();
      nextPiece = getRandomPiece();
      spawnNewPiece();
      drawAll();
      clearGameLoop();
      startLoop();
    }

    // ---------- ОБРАБОТЧИКИ ----------
    function handleAction(action) {
      if (gameOver && action !== 'restart') return;
      
      switch(action) {
        case 'left': movePiece(-1, 0); break;
        case 'right': movePiece(1, 0); break;
        case 'down': movePiece(0, 1); break;
        case 'rotate': rotatePiece(); break;
        case 'hardDrop': hardDrop(); break;
        case 'pause': togglePause(); break;
        case 'restart': resetGame(); break;
      }
      drawAll();
    }

    // Сенсорные кнопки
    document.querySelectorAll('[data-action]').forEach(btn => {
      const action = btn.getAttribute('data-action');
      
      const handler = (e) => {
        e.preventDefault();
        e.stopPropagation();
        handleAction(action);
      };
      
      btn.addEventListener('click', handler);
      btn.addEventListener('touchstart', handler, { passive: false });
    });

    // Клавиатура (десктоп)
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
        e.preventDefault();
      }
      if (gameOver) return;
      
      switch(key) {
        case 'ArrowLeft': handleAction('left'); break;
        case 'ArrowRight': handleAction('right'); break;
        case 'ArrowDown': handleAction('down'); break;
        case 'ArrowUp': handleAction('rotate'); break;
        case ' ': handleAction('pause'); break;
        case 'h': case 'H': handleAction('hardDrop'); break;
      }
    });

    // Адаптивность
    window.addEventListener('resize', () => {
      updateBlockSize();
      drawAll();
    });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });

    // Старт
    updateBlockSize();
    resetGame();
  })();
</script>
</body>
</html>
